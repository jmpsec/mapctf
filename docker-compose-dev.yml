services:
  ########################################## mapctf-api ############################################
  mapctf-api:
    container_name: 'mapctf-api-dev'
    image: 'mapctf-api-dev:${MAPCTF_VERSION}'
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/dockerfiles/Dockerfile-dev-backend
      args:
        GOLANG_VERSION: ${GOLANG_VERSION}
    environment:
      # mapctf-api configuration settings
      - SERVICE_LISTENER=0.0.0.0
      - SERVICE_PORT=8081
      - SERVICE_LOG_FORMAT=console
      # Database settings
      - DB_HOST=mapctf-postgres
      - DB_NAME=${POSTGRES_DB_NAME}
      - DB_PORT=${POSTGRES_DB_PORT}
      - DB_USER=${POSTGRES_DB_USERNAME}
      - DB_PASS=${POSTGRES_DB_PASSWORD}
      #### Redis settings ####
      - REDIS_HOST=mapctf-redis
      - REDIS_PORT=${REDIS_PORT}
      # MapCTF settings
      - MAPCTF_USERNAME=${MAPCTF_USERNAME}
      - MAPCTF_PASSWORD=${MAPCTF_PASSWORD}
    networks:
      - mapctf-dev-backend
    ports:
      - 127.0.0.1:8081:8081
    volumes:
      - .:/usr/src/app:rw,delegated
    depends_on:
      - mapctf-postgres
      - mapctf-redis

   ########################################## mapctf-ui #############################################
  mapctf-ui:
    container_name: 'mapctf-ui-dev'
    image: 'mapctf-ui-dev:${MAPCTF_VERSION}'
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/dockerfiles/Dockerfile-dev-frontend
      args:
        NODE_VERSION: ${NODE_VERSION:-18}
    environment:
      # Frontend configuration settings
      - VITE_API_URL=http://mapctf-api-dev:8081
    networks:
       - mapctf-dev-backend
    ports:
       - 127.0.0.1:3000:3000
    volumes:
       - ./frontend:/app:rw,delegated
       - /app/node_modules
    depends_on:
       - mapctf-api

  ########################################### PostgreSQL ###########################################
  mapctf-postgres:
    container_name: 'mapctf-postgres-dev'
    image: postgres:${POSTGRES_VERSION}
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME}
      - POSTGRES_USER=${POSTGRES_DB_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_DB_PASSWORD}
    networks:
      - mapctf-dev-backend
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - postgres-dev-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_DB_USERNAME} -d ${POSTGRES_DB_NAME}'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ######################################### Redis #########################################
  mapctf-redis:
    container_name: 'mapctf-redis-dev'
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    networks:
      - mapctf-dev-backend
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mapctf-dev-backend:

volumes:
  postgres-dev-db:
  redis-dev-data:
