<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Cache-control" content="no-cache" />
    <meta http-equiv="Expires" content="-1" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAPCTF</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png" />
    <link rel="stylesheet" href="/static/css/mapctf.css" />
  </head>
  <body data-section="pages">
    <div class="mctf-sprite" id="mctf-svg-sprite"></div>
    <div class="mctf-viewport">
      <div id="mctf-main-nav">
        <nav class="mctf-main-nav mctf-navigation">
          <ul class="nav-left">
            <li>
              <a href="/{{ .UUID }}/countdown" data-active="countdown">Play CTF</a>
            </li>
            <li></li>
            <li>
              <a href="/{{ .UUID }}/rules" data-active="rules">Rules</a>
            </li>
          </ul>
          <div class="branding">
            <a href="/{{ .UUID }}/">
              <div class="branding-rules">
                <img src="/static/img/favicon.png" alt="MapCTF logo" class="branding-logo" />
                <span>POWERED BY MAPCTF</span>
              </div>
            </a>
          </div>
          <ul class="nav-right">
            <li>
              <a href="/{{ .UUID }}/registration" data-active="registration">Registration</a>
            </li>
            <li></li>
            {{ if .Authenticated }}
            <li>
              <a href="/{{ .UUID }}/gameboard" data-active="gameboard">Gameboard</a>
            </li>
            {{ else }}
            <li>
              <a href="/{{ .UUID }}/login" data-active="login">Login</a>
            </li>
            {{ end }}
          </ul>
        </nav>
      </div>
      <div id="mctf-main-content" class="mctf-page">
        <main role="main" class="mctf-main page--solo-registration page--landing mctf-img-glitch full-height mctf-scroll">
          <header class="mctf-section-header mctf-container">
            <h1 class="mctf-glitch" data-text="{{ .RegistrationType }}">{{ .RegistrationType }}</h1>
            <p class="inner-container">Register to play Capture The Flag here. Once you have registered, simply login for future site visits.</p>
          </header>

          <div class="mctf-registration">
            <form class="mctf-form">
              <fieldset class="form-set mctf-container container--small">
                <div class="form-el el--text ajax-message-row">
                  <label class="ajax-message-label" aria-hidden="true">Message</label>
                  <div id="ajax-message-box" class="ajax-message" role="alert" aria-live="assertive"></div>
                </div>
                <div class="form-el el--text">
                  <label for="register_username">Username</label>
                  <input type="text" id="register_username" name="register_username" />
                </div>
                <div class="form-el el--text">
                  <label for="register_name">Full Name</label>
                  <input type="text" id="register_name" name="register_name" />
                </div>
                <div class="form-el el--text">
                  <label for="register_email">Email</label>
                  <input type="email" id="register_email" name="register_email" />
                </div>
                <div class="form-el el--text">
                  <label for="register_team_name">Team Name</label>
                  <input type="text" id="register_team_name" name="register_team_name" />
                </div>
                <div class="form-el el--text">
                  <label for="register_password">Password</label>
                  <input type="password" id="register_password" name="register_password" />
                </div>
                <input type="hidden" id="register_url" name="register_url" value="{{ .RegisterURL }}" />
              </fieldset>

              <div class="mctf-choose-emblem">
                <h6>Choose an Emblem</h6>

                <div class="emblem-carousel mctf-container">
                  <input type="hidden" id="register_logo" name="register_logo" value="" />
                  <ul id="register_emblem_list" class="emblem-grid" aria-label="Emblem options"></ul>
                </div>
                <!-- .emblem-carousel -->
              </div>

              <div class="form-el--actions mctf-container container--small">
                <p><button class="mctf-cta cta--yellow" type="button" id="register_button" onclick="sendRegistration()">Sign Up</button></p>
              </div>
            </form>
          </div>
          <!-- .mctf-registration -->
        </main>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js" integrity="sha512-vc58qvvBdrDR4etbxMdlTt4GBQk1qjvyORR2nrsPsFPyrs+/u5c3+1Ct6upOgdZoIl7eq6k3a1UPDSNAQi/32A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/javascript" src="/static/js/plugins.js"></script>
    <script type="text/javascript" src="/static/js/mapctf.js"></script>
    <script type="text/javascript" src="/static/js/functions.js"></script>
    <script type="text/javascript" src="/static/js/register.js"></script>
  </body>
</html>
